<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent;
    overflow: visible;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  .pill {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    padding: 12px 24px;
    border-radius: 28px;
    background: rgba(30, 30, 30, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    position: relative;
    /* Hidden by default */
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.1s ease-out, transform 0.1s ease-out,
                border-radius 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                padding 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                gap 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                width 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .pill.visible {
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.1s ease-out, transform 0.1s ease-out,
                border-radius 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                padding 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                gap 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                width 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .pill.loading {
    border-radius: 50%;
    padding: 14px;
    gap: 0;
    width: 56px;
    height: 56px;
    overflow: hidden;
  }

  .bar {
    width: 3px;
    border-radius: 2px;
    background: rgba(255, 255, 255, 0.9);
    animation: wave 1s ease-in-out infinite;
    transition: transform 0.08s ease-out, opacity 0.3s ease-out,
                width 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                height 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                border-radius 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    flex-shrink: 0;
  }

  /* Loading state: all bars collapse except the spinner ring */
  .pill.loading .bar {
    width: 0;
    height: 0;
    opacity: 0;
  }

  .bar:nth-child(1)  { height: 8px;  animation-delay: -0.9s; }
  .bar:nth-child(2)  { height: 14px; animation-delay: -0.8s; }
  .bar:nth-child(3)  { height: 20px; animation-delay: -0.7s; }
  .bar:nth-child(4)  { height: 26px; animation-delay: -0.6s; }
  .bar:nth-child(5)  { height: 30px; animation-delay: -0.5s; }
  .bar:nth-child(6)  { height: 34px; animation-delay: -0.4s; }
  .bar:nth-child(7)  { height: 30px; animation-delay: -0.3s; }
  .bar:nth-child(8)  { height: 26px; animation-delay: -0.2s; }
  .bar:nth-child(9)  { height: 20px; animation-delay: -0.1s; }
  .bar:nth-child(10) { height: 14px; animation-delay: -0.05s; }
  .bar:nth-child(11) { height: 8px;  animation-delay: 0s; }

  /* Spinner ring — inside pill, hidden by default */
  .spinner {
    position: absolute;
    width: 28px;
    height: 28px;
    border: 2.5px solid rgba(255, 255, 255, 0.15);
    border-top-color: rgba(255, 255, 255, 0.9);
    border-radius: 50%;
    opacity: 0;
    transform: scale(0);
    transition: opacity 0.3s ease-out 0.2s, transform 0.3s ease-out 0.2s;
  }

  .pill.loading .spinner {
    opacity: 1;
    transform: scale(1);
    animation: spin 0.7s linear infinite;
  }

  @keyframes wave {
    0%, 100% { transform: scaleY(0.3); }
    50%      { transform: scaleY(1); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
  <div class="pill" id="pill">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="spinner"></div>
  </div>
  <script>
    var pill = document.getElementById('pill');
    var bars = document.querySelectorAll('.bar');

    function show() {
      pill.style.width = '';
      pill.style.height = '';
      pill.classList.remove('loading');
      pill.classList.add('visible');
    }

    function hide() {
      pill.classList.remove('visible', 'loading');
      pill.style.width = '';
      pill.style.height = '';
    }

    function setMode(mode) {
      if (mode === 'transcribing') {
        // Morph pill into circle with spinner
        pill.classList.add('loading');
      } else if (mode === 'recording') {
        pill.classList.remove('loading');
      } else {
        pill.classList.remove('loading');
        for (var i = 0; i < bars.length; i++) {
          bars[i].style.animation = '';
          bars[i].style.transform = '';
          bars[i].style.transition = '';
        }
      }
    }

    function setLevels(levels) {
      for (var i = 0; i < bars.length && i < levels.length; i++) {
        var v = Math.max(0.15, levels[i]);
        bars[i].style.animation = 'none';
        bars[i].style.transform = 'scaleY(' + v + ')';
      }
    }

    function fadeOut() {
      // Lock current dimensions so CSS can transition from them
      var rect = pill.getBoundingClientRect();
      pill.style.width = rect.width + 'px';
      pill.style.height = rect.height + 'px';
      for (var i = 0; i < bars.length; i++) {
        bars[i].style.animation = 'none';
        bars[i].style.transition = 'transform 0.3s ease-out';
        bars[i].style.transform = 'scaleY(0.15)';
      }
    }
  </script>
</body>
</html>
